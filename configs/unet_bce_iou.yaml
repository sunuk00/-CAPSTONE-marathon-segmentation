# U-Net + BCE/IoU 조합 실험 설정
model_name: "unet"

# Data
data_root: "data/train"
image_size: 512
val_ratio: 0.2
use_augmentation: false

# Model
base_channels: 32

# Training
batch_size: 4
epochs: 30
lr: 0.001
seed: 42
num_workers: 0

# Loss
loss_type: "bce_iou"
bce_weight: 0.3
iou_weight: 0.7
dice_weight: 0.5
pos_weight: 10.0

# Output
output_dir: "outputs/unet_trained"
save_interval: 1
